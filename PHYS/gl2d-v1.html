<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <style>
    body {margin:0;padding:0; width:100vh; height:200vh; font-family:monospace; font-size:1.5rem;}
    canvas {position:fixed;left:0;top:0;margin:0;padding:0;background:black;}
    label {display:inline-block;width:18rem;height:2rem;}
    input {display:inline-block;width:40vh;height:2rem;vertical-align: middle;}
    #controls {position:fixed;left:0;top:0;color:white;width:100vh;height:20vh;z-index:1;padding:16px;}
  </style>
</head>
<body>
  <div id="controls">
    <label id="labelframeskip" for="sliderframeskip">Frameskip</label>
    <input id="sliderframeskip" type="range" min="1" max="100" step="1" value="1">
    <br>
    <label id="labelB" for="sliderB">Field B</label>
    <input id="sliderB" type="range" min="-20" max="20" step="0.1" value="0.0">
    <label id="labelT" for="sliderT">Thermostat T</label>
    <input id="sliderT" type="range" min="4.000" max="15.000" step="0.001" value="11.00">
    <br>
    <label id="labelTMeter">T</label>
    <input id="sliderTMeter" type="range" min="0.000" max="1.000" step="0.001" value="0.100">
    </div>

  
  </div>
  <canvas id="canvas"></canvas>

  <script type="module">
    //================ MATH UTILITIES
    const clamp=(x,a,b)=>Math.min(Math.max(x,a),b)
    const norm=(dx,dy)=>Math.sqrt(dx*dx + dy*dy)
    const harmonicMean=(x,y)=>2*x*y/(x+y+1e-17)
    function interp(x, y, X) {
      const n=x.length, Q=[...y];
      for(let i=1; i<n; ++i) for(let j=0; j<n-i; ++j) Q[j]=((X-x[j])*Q[j+1] - (X-x[j+i])*Q[j])/(x[j+i]-x[j])
      return Q[0]
    }
    //================ GLOBAL SIMULATION VARIABLES
    const ctx=canvas.getContext("2d")
    var frameSkip,B,T
    
    const kB   = 1.380649e-23    
    const E0   = kB*1.0 // energy unit (kB*K)
    const x0   = 1.e-9 // length unit (nanometer)
    const nm   = 1e-9
    const Kelvin=1
    const hbar = 1.054571817e-34
    const mu0  = 1.25663706127e-6
    const M    = 2 * 9.1093837e-31
    const Q    = 2 * 1.60217663e-19
    const gam  = 0.57721566
    const pi   = 3.141592653589793238

    const tstep=0.002
    const trelax=0.2
    const mfict=1
    const zetaDamp=Math.exp(-tstep/trelax)
    const zetaKick=mfict*trelax*(1-zetaDamp)
    
    const X=240,Y=150
    const I=X*Y
    const xi0=new Float32Array(I)   // physical parameters
    const lam0=new Float32Array(I)
    const Tc=new Float32Array(I)
    const alpha=new Float32Array(I) // GL parameters
    const beta=new Float32Array(I)
    const u=new Float32Array(I)     // simulation variables
    const v=new Float32Array(I)
    const p=new Float32Array(I)
    const q=new Float32Array(I)
    const w=new Float32Array(I)
    const wx=new Float32Array(I)
    const wy=new Float32Array(I)
    const Ax=new Float32Array(I)
    const Ay=new Float32Array(I)
    const a    = 10.e-9 // grid spacing?????????????? ( in nm?)

    
    function addRectangle(x0, y0, x1, y1, xi0_, lam0_, Tc_) {
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        if (x0<x && x<x1 && y0<y && y<y1) {xi0[i]=xi0_; lam0[i]=lam0_; Tc[i]=Tc_;}
      }
    }
    function addEllipse(xc, yc, a, b, xi0_, lam0_, Tc_) {
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        if (((x-xc)/a)**2 + ((y-yc)/b)**2 < 1) {xi0[i]=xi0_; lam0[i]=lam0_; Tc[i]=Tc_;}
      }
    }
    function bcsGapEquation(ToverTc) {
      const xi=[0., 0.0954915, 0.345492, 0.654508, 0.904508, 1.]
      const yi=[1., 1., 0.98649, 0.754135, 0.265597, 0.]
      return interp(xi, yi, ToverTc)
    }
    function bcsSuperfluidStiffness(ToverTc) {
      const xi=[0., 0.0954915, 0.345492, 0.654508, 0.904508, 1.]
      const yi=[1, 1., 0.96241, 0.626009, 0.187307, 0]
      return interp(xi, yi, ToverTc)
    }
    function updatewxwy() {
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        const xp=(x+1)%X,iE=xp+X*y
        const yp=(y+1)%Y,iN=x+X*yp
        wx[i]=x<X-1? harmonicMean(w[i], w[iE]) : 0
        wy[i]=y<Y-1? harmonicMean(w[i], w[iN]) : 0
      }
    }
    function init() {
      addRectangle(-1, -1, X, Y,             4*nm, 400*nm, -14*Kelvin)  // insulating substrate by default!
      
      addRectangle(0, 0,   X-1, Y-1,         4*nm, 400*nm, -14*Kelvin)  // NbTiN everywhere
      
      // addEllipse  (.4*Y, .5*Y, .4*Y, .4*Y, 4, 400, +14) // NbTiN disk      
      // addEllipse  (1.*Y, .6*Y, .2*Y, .2*Y, 4, 400, +14) // NbTiN disk....   
      // addEllipse  (1.*Y, .6*Y, .15*Y, .15*Y, 4, 400, -14) // NbTiN annulus      
     
      // addRectangle(.8*X, .5*Y, .9*X, 1*Y,    4, 400, +14)  // NbTiN strip upper right
      // addRectangle(.95*X, .5*Y, 1*X, 1*Y,    4, 400, +14)  // NbTiN strip upper right
      // addRectangle(.5*X, .0*Y, 1*X,    .35*Y, 4, 400, +14)  // NbTiN rectangle lower right
      // addRectangle(.6*X, .1*X, .65*X, .15*X, 4, 400, -14)  // moat
      // addRectangle(.7*X, .1*X, .75*X, .15*X, 4, 400, -14)  // moat
      // addRectangle(.8*X, .1*X, .85*X, .15*X, 4, 400, -14)  // moat

      // addRectangle(0, 0,   X, Y,             +1, +1, 0)  // insulating substrate
      // addEllipse  (.5*Y, .5*Y, .49*Y, .49*Y, -1, +1, +4) // superconducting disk
      // addRectangle(.7*X, .0*Y, .78*X, 1.*Y,   -1, +1, +4) // superconducting strip
      // addRectangle(.8*X, .1*Y, 1.0*X, .9*Y,   -1, +1, +4) // superconducting strip
      updatewxwy()
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        // u and v are in simulation units
        u[i]=(2*Math.random()-1) * 1e-2
        v[i]=(2*Math.random()-1) * 1e-2
        // let xc,yc,theta=0
        // xc=.3*X; yc=.5*Y; theta += Math.atan2(y-yc, x-xc) // add vortex
        // xc=.6*X; yc=.6*Y; theta -= Math.atan2(y-yc, x-xc) // add antivortex
        // xc=.9*X; yc=.2*Y; theta -= Math.atan2(y-yc, x-xc)
        // u[i]=Math.cos(theta)
        // v[i]=Math.sin(theta)
        p[i]=0.
        q[i]=0.
      }
    }

  
    function calcPars(xi0, lam0, Tc, T, h) { // convert material & simulation parameters to GL parameters in SI units
      // Everything in  SI units
      const thickness = h // thickness of the film in SI units (meters)

      // if (Tc<0) { // this represents that material is an insulator
      //   // THIS BRANCH IS OLD
      //   const w = 0          // w=0 for insulator
      //   // const alpha =(35e-9*E0) * thickness
      //   const alpha =.0000000003
      //   const beta = 0
      //   return [alpha,beta,w]
      // }
      // if (T>=Tc) {
      //   // THIS BRANCH IS OLD
      //   const w = hbar**2/M * thickness        // warning: would overflow if single precision
        
      //   const Delta0 = pi/Math.exp(gam) * kB * Tc
      //   const vF = pi * Delta0 * xi0 / hbar
      //   const xi = hbar * vF / (pi*Delta0)
      //   const alpha = -(hbar**2) / (4*M*xi**2) * 3*(1-T/Tc) * thickness        
      //   const beta = 0 * thickness
      //   return [alpha,beta,w]
      // }
      {
        const w = hbar**2/M  * thickness

        const Delta0 = pi/Math.exp(gam) * kB * Tc
        const Delta = Delta0 * bcsGapEquation(T/Tc)        
        const vF = pi * Delta0 * xi0 / hbar
        const xi = hbar * vF / (pi*Delta0)
        const alpha = -(hbar**2) / (4*M*xi**2) * thickness
        
        const Ups0 = 1/(mu0*lam0**2)
        const Ups = Ups0 * bcsSuperfluidStiffness(T/Tc)
        const lam = (mu0*Ups)**(-0.5)
        const beta = +mu0*Q**2*hbar**2*lam**2/(4*M**2*xi**2) * thickness

        return [alpha,beta,w]        
      }
    }
    function setB(e) {
      B = Number(sliderB.value)
      labelB.innerHTML = 'B = '+B+'nT'
      const Phi0=2e-15 // flux quantum in SI units
      const fac=2*pi/Phi0*a*B*1e-9/2
      const xcen=(X-1)/2, ycen=(Y-1)/2
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        Ax[i]=fac*(ycen-y)  //-(y-(Y-1)/2)*B/2
        Ay[i]=fac*(x-xcen)  //(x-(X-1)/2)*B/2  // needto also multiply by grid spacing a ?????
      }
    }
    function setT(e) {
      T = Number(sliderT.value)
      labelT.innerHTML = `T = ${T} K`
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        const [aaa,bbb,www] = calcPars(xi0[i], lam0[i], Tc[i], T, 100*nm) // these are in SI units        
        alpha[i]=aaa/(E0*x0)    * (a/x0)**2  // include these stepszie factors
        beta[i] =bbb/(E0*x0**4) * (a/x0)**2
        w[i]    =www/(E0*x0**3)        
        // console.log(alpha[i], beta[i], w[i])
      }
      updatewxwy()
    }
    function setMisc(e) {
      frameSkip = Number(sliderframeskip.value)
      labelframeskip.innerHTML = `Frameskip = ${frameSkip}`
    }
    function evolve(t) {
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) { // calculate forces
        const xp=(x+1)%X,xm=(x+X-1)%X
        const yp=(y+1)%Y,ym=(y+Y-1)%Y
        const i=x+X*y,iE=xp+X*y,iW=xm+X*y,iN=x+X*yp,iS=x+X*ym
        let c,s,ui=u[i],vi=v[i]
        const Zi = (alpha[i] + beta[i]*(ui**2 + vi**2)/2)
        // need to check sense
        c=Math.cos(Ax[i]) ;s= Math.sin(Ax[i]) ; const uE=c*u[iE] - s*v[iE] - ui, vE=s*u[iE] + c*v[iE] - vi
        c=Math.cos(Ax[iW]);s=-Math.sin(Ax[iW]); const uW=c*u[iW] - s*v[iW] - ui, vW=s*u[iW] + c*v[iW] - vi
        c=Math.cos(Ay[i]) ;s= Math.sin(Ay[i]) ; const uN=c*u[iN] - s*v[iN] - ui, vN=s*u[iN] + c*v[iN] - vi
        c=Math.cos(Ay[iS]);s=-Math.sin(Ay[iS]); const uS=c*u[iS] - s*v[iS] - ui, vS=s*u[iS] + c*v[iS] - vi
        const f = (wx[i]*uE + wx[iW]*uW + wy[i]*uN + wy[iS]*uS)/2 - Zi*ui
        const g = (wx[i]*vE + wx[iW]*vW + wy[i]*vN + wy[iS]*vS)/2 - Zi*vi        
        
        // kick+damp+diffuse
        p[i] = zetaKick*f + zetaDamp*p[i]   // haven't added random difusion yet?
        q[i] = zetaKick*g + zetaDamp*q[i]
      }
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {const i=x+X*y
        u[i] += p[i]*tstep/mfict
        v[i] += q[i]*tstep/mfict
      }
    }
    function hsv2rgb(h,s,v) { //h in [0,2*pi] and s,v in [0,1]; r,g,b in [0,255]
      const f= (n,k=(n+h*3/Math.PI)%6) => Math.floor(255*(v - v*s*Math.max( Math.min(k,4-k,1), 0)))
      return [f(5),f(3),f(1)]
    }
    function animate(timeCurrent) {
      for (let i=0; i<frameSkip; ++i) evolve()
      const a = Math.min(Math.floor(canvas.width/X),Math.floor(canvas.height/Y))
      ctx.setTransform(a, 0, 0, -a, 0, canvas.height)
      const magTypical = 0.5
      for (let x=0; x<X; ++x) for (let y=0; y<Y; ++y) {
        const i=x+X*y
        const arg=Math.atan2(v[i],u[i])
        const mag=(u[i]**2+v[i]**2) / magTypical
        const [r,g,b] = hsv2rgb(arg, 1, mag/(1+mag))
        ctx.fillStyle= `rgb(${r}, ${g}, ${b})`
        ctx.fillRect(x,y,1,1)
      }
      requestAnimationFrame(animate)
    }
    function resize() {
      canvas.width=visualViewport.width||window.innerWidth||document.documentElement.clientWidth||document.body.clientWidth
      canvas.height=visualViewport.height||window.innerHeight||document.documentElement.clientHeight||document.body.clientHeight
    }
    //================ MAIN CODE
    document.body.addEventListener('dblclick', function (e) { e.preventDefault() })
    window.visualViewport.addEventListener('resize', resize)
    sliderB.addEventListener('input', setB)
    sliderT.addEventListener('input', setT)
    sliderframeskip.addEventListener('input', setMisc)
    init(); setB(); setT(); setMisc(); resize(); requestAnimationFrame(animate);

  </script>
</body>
</html>
